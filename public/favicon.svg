<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#FAF6F0"/>
  
  <!-- Coffee bean with gradient -->
  <defs>
    <linearGradient id="beanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6F5D3E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C4E2F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main bean body - S curve shape -->
  <path d="M 90 35 Q 135 50 135 90 Q 135 130 90 145 Q 45 130 45 90 Q 45 50 90 35 Z" 
        fill="url(#beanGradient)" />
  
  <!-- Central crease highlight -->
  <path d="M 90 40 Q 88 70 88 90 Q 88 110 90 140" 
        stroke="#4A3F2E" stroke-width="2.5" fill="none" opacity="0.6" />
  
  <!-- Light reflection -->
  <ellipse cx="78" cy="65" rx="10" ry="14" fill="#A0825A" opacity="0.4" />
</svg>
