<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Coffee bean shape with gradient -->
  <defs>
    <linearGradient id="beanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6F5D3E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C4E2F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main bean body - S curve shape -->
  <path d="M 50 15 Q 75 25 75 50 Q 75 75 50 85 Q 25 75 25 50 Q 25 25 50 15 Z" 
        fill="url(#beanGradient)" />
  
  <!-- Central crease highlight -->
  <path d="M 50 20 Q 48 40 48 50 Q 48 60 50 80" 
        stroke="#4A3F2E" stroke-width="1.5" fill="none" opacity="0.6" />
  
  <!-- Light reflection -->
  <ellipse cx="42" cy="35" rx="6" ry="8" fill="#A0825A" opacity="0.4" />
</svg>